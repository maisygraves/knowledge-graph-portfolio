# default configurations ...
# https://jekyllrb.com/docs/configuration/default/
# tool icons at https://www.techicons.dev/icons


# site settings
title: [Title]
description: documented projects, reflective write-ups and a curated collection of technical resources

# about me table
name: [Your Name]
about-me: [sentence about you]
collections:
  skills:
    output: true
  tools:
    output: true
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: "tools"
    values:
      layout: "tools-page"
  - scope:
      path: ""
      type: "skills"
    values:
      layout: "skills-page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"
    

